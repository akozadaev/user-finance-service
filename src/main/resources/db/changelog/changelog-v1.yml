databaseChangeLog:
  - changeSet:
      id: 1-create-finance-schema
      author: akozadaev
      changes:
        - createTable:
            tableName: users
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: name, type: VARCHAR(500), constraints: { nullable: false } }
              - column: { name: date_of_birth, type: DATE, constraints: { nullable: false } }
              - column: { name: password, type: VARCHAR(500), constraints: { nullable: false } }
        - createTable:
            tableName: account
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: user_id, type: BIGINT, constraints: { nullable: false, unique: true, foreignKeyName: fk_account_user, references: users(id) } }
              - column: { name: balance, type: "DECIMAL(19,2)", constraints: { nullable: false } }
              - column: { name: initial_balance, type: "DECIMAL(19,2)", constraints: { nullable: false } }
              - column: { name: version, type: BIGINT, defaultValueNumeric: 0, constraints: { nullable: false } }
        - sql:
            sql: "ALTER TABLE account ADD CONSTRAINT chk_account_balance CHECK (balance >= 0 AND initial_balance >= 0)"
        - createTable:
            tableName: email_data
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: user_id, type: BIGINT, constraints: { nullable: false, foreignKeyName: fk_email_user, references: users(id) } }
              - column: { name: email, type: VARCHAR(200), constraints: { nullable: false, unique: true } }
        - createTable:
            tableName: phone_data
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: user_id, type: BIGINT, constraints: { nullable: false, foreignKeyName: fk_phone_user, references: users(id) } }
              - column: { name: phone, type: VARCHAR(13), constraints: { nullable: false, unique: true } }
        - createTable:
            tableName: oauth_identity
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: user_id, type: BIGINT, constraints: { nullable: false, foreignKeyName: fk_oauth_identity_user, references: users(id) } }
              - column: { name: subject, type: VARCHAR(36), constraints: { nullable: false, unique: true } }
        - createIndex: { tableName: users, indexName: idx_users_name, columns: [ { column: { name: name } } ] }
        - createIndex: { tableName: users, indexName: idx_users_date_of_birth, columns: [ { column: { name: date_of_birth } } ] }
  - changeSet:
      id: 2-seed-users
      author: akozadaev
      changes:
        - insert:
            tableName: users
            columns:
              - column: { name: name, value: "Иван Иванов" }
              - column: { name: date_of_birth, valueDate: "1993-05-01" }
              - column: { name: password, value: "$2a$10$N9qo8uLOickgx2ZMRZoMyeIjZAgcfl7p92ldGxad68LJZdL17lhWy" }
        - insert:
            tableName: users
            columns:
              - column: { name: name, value: "Петр Петров" }
              - column: { name: date_of_birth, valueDate: "1988-10-10" }
              - column: { name: password, value: "$2a$10$N9qo8uLOickgx2ZMRZoMyeIjZAgcfl7p92ldGxad68LJZdL17lhWy" }
        - insert: { tableName: account, columns: [ { column: { name: user_id, valueNumeric: 1 } }, { column: { name: balance, valueNumeric: 1000.00 } }, { column: { name: initial_balance, valueNumeric: 1000.00 } } ] }
        - insert: { tableName: account, columns: [ { column: { name: user_id, valueNumeric: 2 } }, { column: { name: balance, valueNumeric: 500.00 } }, { column: { name: initial_balance, valueNumeric: 500.00 } } ] }
        - insert: { tableName: email_data, columns: [ { column: { name: user_id, valueNumeric: 1 } }, { column: { name: email, value: "ivan@example.com" } } ] }
        - insert: { tableName: email_data, columns: [ { column: { name: user_id, valueNumeric: 2 } }, { column: { name: email, value: "petr@example.com" } } ] }
        - insert: { tableName: phone_data, columns: [ { column: { name: user_id, valueNumeric: 1 } }, { column: { name: phone, value: "79207865432" } } ] }
        - insert: { tableName: phone_data, columns: [ { column: { name: user_id, valueNumeric: 2 } }, { column: { name: phone, value: "79207865433" } } ] }
