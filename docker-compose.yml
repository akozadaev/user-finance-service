services:
  postgres:
    image: postgres:16
    container_name: user-finance-postgres
    environment:
      POSTGRES_DB: user_finance
      POSTGRES_USER: user_finance
      POSTGRES_PASSWORD: user_finance
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_finance -d user_finance"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data
volumes:
  postgres-data:
